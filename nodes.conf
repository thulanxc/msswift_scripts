# ==============================================================================
# 集群配置 - 这是唯一需要你手动编辑的文件
# 编辑完成后运行: bash configure.sh
# ==============================================================================

# ---- 节点 IP 列表 (第一个为主节点) ----
# 有几台就写几行，不需要改其他脚本
NODES=(
    xxx.xxx.xxx.xxx    # node0 (主节点)
    xxx.xxx.xxx.xxx    # node1
    xxx.xxx.xxx.xxx    # node2
    xxx.xxx.xxx.xxx    # node3
    xxx.xxx.xxx.xxx    # node4
    xxx.xxx.xxx.xxx    # node5
)

# ---- SSH 用户名 ----
SSH_USER=root

# ---- 数据路径 (过滤后的 parquet 数据目录, 所有节点需一致) ----
DATA_PATH=/path/to/data_filtered

# ---- 模型 (HuggingFace 名称 或 本地绝对路径) ----
MODEL_PATH=Qwen/Qwen3-4B-Thinking-2507

# ---- 输出目录 ----
OUTPUT_DIR=./output/qwen3-4b-thinking-sft-multinode

# ---- 每台机器的 GPU 数 ----
NPROC_PER_NODE=8
