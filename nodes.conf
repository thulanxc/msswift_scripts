# ==============================================================================
# 集群配置 - 这是唯一需要你手动编辑的文件
# 编辑完成后运行: bash configure.sh
# ==============================================================================

# ---- 6 台机器的 IP (必填) ----
# 运行 hostname -I 或 ip addr 查看
NODE0=xxx.xxx.xxx.xxx
NODE1=xxx.xxx.xxx.xxx
NODE2=xxx.xxx.xxx.xxx
NODE3=xxx.xxx.xxx.xxx
NODE4=xxx.xxx.xxx.xxx
NODE5=xxx.xxx.xxx.xxx

# ---- SSH 用户名 ----
SSH_USER=root

# ---- 数据路径 (过滤后的 parquet 数据目录, 所有节点需一致) ----
DATA_PATH=/path/to/data_filtered

# ---- 模型 (HuggingFace 名称 或 本地绝对路径) ----
MODEL_PATH=Qwen/Qwen3-4B-Thinking-2507

# ---- 输出目录 ----
OUTPUT_DIR=./output/qwen3-4b-thinking-sft-multinode
